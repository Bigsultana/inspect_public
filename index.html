<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d5a86">
<title>PTG Inspect Public</title>
<style>
body{margin:0;background:#eef5fb;color:#143047;font-family:Arial,sans-serif}header{position:sticky;top:0;background:#fff;border-bottom:1px solid #c8d7e5;padding:12px 14px;z-index:2}.brand{font-weight:700;color:#0d5a86}.small{font-size:12px;color:#557086}main{max-width:850px;margin:0 auto;padding:12px 12px 90px;display:grid;gap:12px}.card{background:#fff;border:1px solid #c8d7e5;border-radius:16px;overflow:hidden;box-shadow:0 10px 24px rgba(20,48,71,.08)}.head{padding:14px;border-bottom:1px solid #c8d7e5}h2{margin:0;color:#0d5a86;font-size:18px}.body{padding:14px;display:grid;gap:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:grid;gap:6px;font-weight:700;font-size:12px;color:#557086}input,select,textarea{font:inherit;padding:11px;border:1px solid #c8d7e5;border-radius:10px}textarea{min-height:90px}.btn{border:0;border-radius:12px;padding:12px 14px;font-weight:700;background:#0d5a86;color:#fff;min-height:46px}.btn2{background:#f5f9fc;color:#0d5a86;border:1px solid #c8d7e5}.danger{background:#fff1f1;color:#b73535;border:1px solid #e9b7b7}.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.slot{border:1px solid #c8d7e5;border-radius:14px;background:#f5f9fc;padding:10px;display:grid;gap:8px}.preview{height:150px;border:1px dashed #c8d7e5;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#557086;font-size:12px}.preview img{width:100%;height:100%;object-fit:cover}.status{font-size:12px;color:#557086;background:#f5f9fc;border:1px solid #c8d7e5;border-radius:10px;padding:10px}.record{border:1px solid #c8d7e5;border-radius:14px;background:#f5f9fc;padding:12px;margin-bottom:10px}.thumb{width:70px;height:70px;object-fit:cover;border-radius:10px;border:1px solid #c8d7e5;margin-right:6px}.bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #c8d7e5;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:700px){.grid,.photos{grid-template-columns:1fr}.preview{height:220px}}
</style>
</head>
<body>
<header><div class="brand">PTG Inspect Public</div><div class="small">clean public mobile photo workflow test</div></header>
<main>
<section class="card"><div class="head"><h2>Inspection</h2><div class="small">Save simple local inspection records with staged photos.</div></div><div class="body">
<div class="grid"><label>Project ID<input id="projectId" placeholder="PTG-001"></label><label>Inspector<input id="inspector" placeholder="Inspector"></label></div>
<label>Project Name<input id="projectName" placeholder="Project / site"></label>
<div class="grid"><label>Date<input id="date" type="date"></label><label>Area / Wall ID<input id="area" placeholder="Wall 1 / CH41"></label></div>
<label>Inspection Type<select id="type"><option>Retaining wall inspection</option><option>Footing inspection</option><option>Temporary stability assessment</option><option>General site inspection</option></select></label>
<label>Notes<textarea id="notes" placeholder="Record inspection observations"></textarea></label>
</div></section>
<section class="card"><div class="head"><h2>Photos</h2><div class="small">A thumbnail must appear here before the photo is staged.</div></div><div class="body">
<label class="btn btn2" style="text-align:center;position:relative;overflow:hidden">Choose photos / camera<input id="photoInput" type="file" accept="image/*" multiple style="position:absolute;inset:0;opacity:0"></label>
<div id="photoGrid" class="photos"></div><div id="photoStatus" class="status">0/3 photos staged.</div>
</div></section>
<section class="card"><div class="head"><h2>Saved Records</h2></div><div class="body"><div id="records"></div><button class="btn danger" onclick="clearRecords()">Clear Saved Records</button></div></section>
</main>
<div class="bar"><button class="btn" onclick="saveRecord()">Save Inspection</button><button class="btn btn2" onclick="exportJSON()">Export JSON</button></div>
<script>
const MAX=3;let photos=[null,null,null];const $=id=>document.getElementById(id);$('date').value=new Date().toISOString().slice(0,10);
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function renderPhotos(){photoGrid.innerHTML=[0,1,2].map(i=>'<div class="slot"><div class="preview">'+(photos[i]?'<img src="'+photos[i].data+'">':'No photo '+(i+1))+'</div><label>Caption<input id="cap'+i+'" value="'+esc(photos[i]?.caption||defaultCap(i))+'" oninput="if(photos['+i+'])photos['+i+'].caption=this.value"></label><button class="btn danger" onclick="removePhoto('+i+')">Remove</button></div>').join('');photoStatus.textContent=photos.filter(Boolean).length+'/3 photos staged.'}
function defaultCap(i){return (($('projectId').value||'Project')+' - '+($('area').value||'Site')+' - Photo '+(i+1));}
function free(){return photos.findIndex(x=>!x)}
function read(f){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(String(r.result||''));r.onerror=()=>rej(r.error);r.readAsDataURL(f)})}
function img(src){return new Promise((res,rej)=>{let im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src})}
async function compress(src){let im=await img(src),m=1000,w=im.naturalWidth,h=im.naturalHeight,sc=Math.min(1,m/Math.max(w,h));let c=document.createElement('canvas');c.width=Math.round(w*sc);c.height=Math.round(h*sc);c.getContext('2d').drawImage(im,0,0,c.width,c.height);return c.toDataURL('image/jpeg',.84)}
photoInput.addEventListener('change',async e=>{for(const f of Array.from(e.target.files||[])){let i=free();if(i<0)break;try{photos[i]={data:await compress(await read(f)),caption:defaultCap(i),name:f.name||'',time:new Date().toISOString()}}catch(err){photoStatus.textContent='Photo failed: '+err}}e.target.value='';renderPhotos()});
function removePhoto(i){photos[i]=null;renderPhotos()}
function records(){return JSON.parse(localStorage.getItem('ptg_public_records')||'[]')}function setRecords(r){localStorage.setItem('ptg_public_records',JSON.stringify(r));renderRecords()}
function saveRecord(){let r={uid:(projectId.value||'PROJECT')+'_'+Date.now(),projectId:projectId.value,projectName:projectName.value,inspector:inspector.value,date:date.value,area:area.value,type:type.value,notes:notes.value,photos:photos.filter(Boolean)};if(!r.projectId){alert('Enter Project ID');return}let all=records();all.push(r);setRecords(all);photos=[null,null,null];renderPhotos()}
function renderRecords(){let all=records();recordsDiv=records;if(!all.length){$('records').innerHTML='<div class="status">No saved records.</div>';return}$('records').innerHTML=all.slice().reverse().map(r=>'<div class="record"><b>'+esc(r.uid)+'</b><div class="small">'+esc(r.projectName)+' · '+esc(r.date)+' · '+esc(r.type)+'</div><p>'+esc(r.notes)+'</p><div>'+r.photos.map(p=>'<img class="thumb" src="'+p.data+'">').join('')+'</div></div>').join('')}
function clearRecords(){if(confirm('Clear saved records on this device?'))setRecords([])}
function exportJSON(){let all=records();if(!all.length){alert('No records');return}let blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='ptg_inspect_public.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
renderPhotos();renderRecords();
</script>
</body>
</html>
